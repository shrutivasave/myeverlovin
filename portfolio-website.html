<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URMYEVERLOVIN - Music Promoter</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Courier Prime', 'Courier New', monospace;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;

    // DATA
    const artistsData = [
      { 
        id: 'name1', 
        name: 'Artist One', 
        image: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&h=400&fit=crop', 
        ig: '@artistone', 
        bio: 'Genre-defying artist known for electrifying live performances and experimental sound. Recently headlined festivals across Europe and North America.' 
      },
      { 
        id: 'name2', 
        name: 'Artist Two', 
        image: 'https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=400&h=400&fit=crop', 
        ig: '@artisttwo', 
        bio: 'Rising star in the indie scene with three critically acclaimed albums. Known for intimate storytelling and soulful vocals.' 
      },
      { 
        id: 'name3', 
        name: 'Artist Three', 
        image: 'https://images.unsplash.com/photo-1506157786151-b8491531f063?w=400&h=400&fit=crop', 
        ig: '@artistthree', 
        bio: 'Electronic music pioneer blending ambient textures with dance floor energy. Residencies in Berlin and Tokyo.' 
      },
      { 
        id: 'name4', 
        name: 'Artist Four', 
        image: 'https://images.unsplash.com/photo-1487180144351-b8472da7d491?w=400&h=400&fit=crop', 
        ig: '@artistfour', 
        bio: 'Multi-instrumentalist and producer pushing boundaries in jazz fusion and hip-hop collaboration.' 
      },
      { 
        id: 'name5', 
        name: 'Artist Five', 
        image: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&h=400&fit=crop', 
        ig: '@artistfive', 
        bio: 'Singer-songwriter with a voice that stops crowds. Building a devoted following through raw, honest performances.' 
      },
      { 
        id: 'name6', 
        name: 'Artist Six', 
        image: 'https://images.unsplash.com/photo-1501612780327-45045538702b?w=400&h=400&fit=crop', 
        ig: '@artistsix', 
        bio: 'Experimental noise artist turned chart-topper. Known for unexpected collaborations and genre-breaking releases.' 
      },
    ];

    const showsData = [
      { 
        id: 1, 
        title: 'Summer Festival 2024', 
        image: 'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=800&h=450&fit=crop', 
        type: 'image' 
      },
      { 
        id: 2, 
        title: 'Underground Sessions Vol. 3', 
        image: 'https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=800&h=450&fit=crop', 
        type: 'image' 
      },
      { 
        id: 3, 
        title: 'Warehouse Rave Series', 
        image: 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&h=450&fit=crop', 
        type: 'image' 
      },
      { 
        id: 4, 
        title: 'Acoustic Nights', 
        image: 'https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=800&h=450&fit=crop', 
        type: 'image' 
      },
    ];

    const tasteData = [
      { 
        id: 1, 
        album: 'Kind of Blue - Miles Davis', 
        image: 'https://images.unsplash.com/photo-1619983081563-430f63602796?w=400&h=400&fit=crop' 
      },
      { 
        id: 2, 
        album: 'OK Computer - Radiohead', 
        image: 'https://images.unsplash.com/photo-1618509999686-5ac49b8f6c8e?w=400&h=400&fit=crop' 
      },
      { 
        id: 3, 
        album: 'Illmatic - Nas', 
        image: 'https://images.unsplash.com/photo-1603048588665-791ca8aea617?w=400&h=400&fit=crop' 
      },
      { 
        id: 4, 
        album: 'In Rainbows - Radiohead', 
        image: 'https://images.unsplash.com/photo-1629276301820-0f3eedc29fd0?w=400&h=400&fit=crop' 
      },
      { 
        id: 5, 
        album: 'Blonde - Frank Ocean', 
        image: 'https://images.unsplash.com/photo-1619983081593-e2ba5b543168?w=400&h=400&fit=crop' 
      },
      { 
        id: 6, 
        album: 'The Velvet Underground', 
        image: 'https://images.unsplash.com/photo-1615887440834-c6dc7a3e3b9f?w=400&h=400&fit=crop' 
      },
    ];

    const venues = [
      'The Echo - Los Angeles',
      'Brooklyn Steel - New York',
      'The Roxy - Boston',
      'First Avenue - Minneapolis',
      'The Fillmore - San Francisco',
      'Metro - Chicago'
    ];

    // COMPONENTS
    const StaticContact = () => (
      <div className="fixed top-4 right-4 text-red-600 text-xs z-50 font-mono">
        email: aaa-@ighandle-telephonenumbere
      </div>
    );

    const Logo = ({ onClick, className = "" }) => (
      <button 
        onClick={onClick}
        className={`font-mono font-bold text-2xl tracking-wider hover:text-red-600 transition-colors ${className}`}
      >
        URMYEVERLOVIN
      </button>
    );

    const Navigation = ({ onNavigate, mobile = false }) => {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const tabs = ['Artists', 'Shows', 'Taste', 'About'];
      
      if (mobile) {
        return (
          <div className="relative">
            <button
              onClick={() => setIsMenuOpen(!isMenuOpen)}
              className="font-mono text-black hover:text-red-600 transition-colors mb-4"
            >
              [MENU]
            </button>
            
            {isMenuOpen && (
              <div className="flex flex-col gap-2 mb-4">
                {tabs.map(tab => (
                  <button
                    key={tab}
                    onClick={() => {
                      onNavigate(tab.toLowerCase());
                      setIsMenuOpen(false);
                    }}
                    className="font-mono text-black opacity-60 hover:opacity-100 transition-opacity text-left"
                  >
                    {tab}
                  </button>
                ))}
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="flex gap-8">
          {tabs.map(tab => (
            <button
              key={tab}
              onClick={() => onNavigate(tab.toLowerCase())}
              className="font-mono text-black hover:text-red-600 transition-colors"
            >
              {tab}
            </button>
          ))}
        </div>
      );
    };

    // PAGES
    const LandingPage = ({ onNavigate }) => (
      <div className="min-h-screen flex items-center justify-center bg-white">
        <div className="text-center px-4">
          <div className="font-mono font-bold text-4xl md:text-5xl tracking-wider mb-12">
            URMYEVERLOVIN
          </div>
          
          {/* Desktop Navigation */}
          <div className="hidden md:flex justify-center gap-8">
            {['Artists', 'Shows', 'Taste', 'About'].map(tab => (
              <button
                key={tab}
                onClick={() => onNavigate(tab.toLowerCase())}
                className="font-mono text-xl hover:text-red-600 transition-colors pb-1"
              >
                {tab}
              </button>
            ))}
          </div>

          {/* Mobile Navigation */}
          <div className="md:hidden flex flex-col gap-4">
            {['Artists', 'Shows', 'Taste', 'About'].map(tab => (
              <button
                key={tab}
                onClick={() => onNavigate(tab.toLowerCase())}
                className="font-mono text-xl hover:text-red-600 transition-colors pb-2"
              >
                {tab}
              </button>
            ))}
          </div>
        </div>
      </div>
    );

    const ArtistsPage = ({ selectedArtist, setSelectedArtist, onNavigate, goToLanding }) => {
      if (selectedArtist) {
        return (
          <div className="min-h-screen bg-white">
            <StaticContact />
            
            {/* Header - Desktop */}
            <div className="hidden md:flex justify-between items-center p-8 border-b border-black">
              <Logo onClick={goToLanding} />
              <Navigation onNavigate={onNavigate} />
            </div>

            {/* Header - Mobile */}
            <div className="md:hidden p-6 border-b border-black">
              <Navigation onNavigate={onNavigate} mobile />
              <Logo onClick={goToLanding} className="mt-4" />
            </div>

            {/* Artist Detail - Desktop */}
            <div className="hidden md:flex p-12 gap-12">
              <div className="flex-1">
                <h2 className="font-mono text-4xl mb-4">{selectedArtist.name}</h2>
                <a 
                  href={`https://instagram.com/${selectedArtist.ig.slice(1)}`} 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  className="font-mono text-red-600 hover:underline mb-6 block"
                >
                  {selectedArtist.ig}
                </a>
                <p className="font-mono text-sm leading-relaxed">{selectedArtist.bio}</p>
                <button 
                  onClick={() => setSelectedArtist(null)}
                  className="mt-8 font-mono border border-black px-6 py-2 hover:bg-black hover:text-white transition-colors"
                >
                  ← Back to Artists
                </button>
              </div>
              <div className="flex-1">
                <img 
                  src={selectedArtist.image} 
                  alt={selectedArtist.name} 
                  className="w-full aspect-square object-cover" 
                />
              </div>
            </div>

            {/* Artist Detail - Mobile */}
            <div className="md:hidden p-6">
              <h2 className="font-mono text-3xl mb-3">{selectedArtist.name}</h2>
              <a 
                href={`https://instagram.com/${selectedArtist.ig.slice(1)}`} 
                target="_blank" 
                rel="noopener noreferrer" 
                className="font-mono text-red-600 hover:underline mb-4 block"
              >
                {selectedArtist.ig}
              </a>
              <img 
                src={selectedArtist.image} 
                alt={selectedArtist.name} 
                className="w-full aspect-square object-cover mb-6" 
              />
              <p className="font-mono text-sm leading-relaxed mb-6">{selectedArtist.bio}</p>
              <button 
                onClick={() => setSelectedArtist(null)}
                className="font-mono border border-black px-6 py-2 hover:bg-black hover:text-white transition-colors"
              >
                ← Back
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-white">
          <StaticContact />
          
          {/* Header - Desktop */}
          <div className="hidden md:flex justify-between items-center p-8 border-b border-black">
            <Logo onClick={goToLanding} />
            <Navigation onNavigate={onNavigate} />
          </div>

          {/* Header - Mobile */}
          <div className="md:hidden p-6 border-b border-black">
            <Navigation onNavigate={onNavigate} mobile />
            <Logo onClick={goToLanding} className="mt-4" />
          </div>

          {/* Artists Grid - Desktop (3 columns) */}
          <div className="hidden md:grid grid-cols-3 gap-8 p-12">
            {artistsData.map(artist => (
              <button
                key={artist.id}
                onClick={() => setSelectedArtist(artist)}
                className="group"
              >
                <img 
                  src={artist.image} 
                  alt={artist.name}
                  className="w-full aspect-square object-cover mb-3 grayscale group-hover:grayscale-0 transition-all"
                />
                <p className="font-mono text-sm group-hover:text-red-600 transition-colors">
                  {artist.name}
                </p>
              </button>
            ))}
          </div>

          {/* Artists Grid - Mobile (2 columns) */}
          <div className="md:hidden grid grid-cols-2 gap-6 p-6">
            {artistsData.map(artist => (
              <button
                key={artist.id}
                onClick={() => setSelectedArtist(artist)}
                className="group"
              >
                <img 
                  src={artist.image} 
                  alt={artist.name}
                  className="w-full aspect-square object-cover mb-2"
                />
                <p className="font-mono text-xs">{artist.name}</p>
              </button>
            ))}
          </div>
        </div>
      );
    };

    const ShowsPage = ({ onNavigate, goToLanding }) => (
      <div className="min-h-screen bg-white">
        <StaticContact />
        
        {/* Header - Desktop */}
        <div className="hidden md:flex justify-between items-center p-8 border-b border-black">
          <Logo onClick={goToLanding} />
          <Navigation onNavigate={onNavigate} />
        </div>

        {/* Header - Mobile */}
        <div className="md:hidden p-6 border-b border-black">
          <Navigation onNavigate={onNavigate} mobile />
          <Logo onClick={goToLanding} className="mt-4" />
        </div>

        {/* Shows - Single Column */}
        <div className="p-6 md:p-12 max-w-4xl mx-auto">
          <div className="space-y-12">
            {showsData.map(show => (
              <div key={show.id} className="group">
                <img 
                  src={show.image} 
                  alt={show.title}
                  className="w-full aspect-video object-cover mb-4 grayscale group-hover:grayscale-0 transition-all"
                />
                <p className="font-mono text-sm md:text-base group-hover:text-red-600 transition-colors">
                  {show.title}
                </p>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    const TastePage = ({ onNavigate, goToLanding }) => (
      <div className="min-h-screen bg-white">
        <StaticContact />
        
        {/* Header - Desktop */}
        <div className="hidden md:flex justify-between items-center p-8 border-b border-black">
          <Logo onClick={goToLanding} />
          <Navigation onNavigate={onNavigate} />
        </div>

        {/* Header - Mobile */}
        <div className="md:hidden p-6 border-b border-black">
          <Navigation onNavigate={onNavigate} mobile />
          <Logo onClick={goToLanding} className="mt-4" />
        </div>

        {/* Records Grid - Desktop (3 columns) */}
        <div className="hidden md:grid grid-cols-3 gap-8 p-12">
          {tasteData.map(record => (
            <div key={record.id} className="group">
              <img 
                src={record.image} 
                alt={record.album}
                className="w-full aspect-square object-cover mb-3 grayscale group-hover:grayscale-0 transition-all"
              />
              <p className="font-mono text-xs leading-relaxed">{record.album}</p>
            </div>
          ))}
        </div>

        {/* Records Grid - Mobile (2 columns) */}
        <div className="md:hidden grid grid-cols-2 gap-6 p-6">
          {tasteData.map(record => (
            <div key={record.id}>
              <img 
                src={record.image} 
                alt={record.album}
                className="w-full aspect-square object-cover mb-2"
              />
              <p className="font-mono text-xs leading-relaxed">{record.album}</p>
            </div>
          ))}
        </div>
      </div>
    );

    const AboutPage = ({ onNavigate, goToLanding }) => (
      <div className="min-h-screen bg-white">
        <StaticContact />
        
        {/* Header - Desktop */}
        <div className="hidden md:flex justify-between items-center p-8 border-b border-black">
          <Logo onClick={goToLanding} />
          <Navigation onNavigate={onNavigate} />
        </div>

        {/* Header - Mobile */}
        <div className="md:hidden p-6 border-b border-black">
          <Navigation onNavigate={onNavigate} mobile />
          <Logo onClick={goToLanding} className="mt-4" />
        </div>

        {/* Content */}
        <div className="p-6 md:p-12 max-w-4xl mx-auto">
          {/* Profile */}
          <div className="mb-12">
            <img 
              src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=600&h=600&fit=crop"
              alt="Profile"
              className="w-full md:w-1/2 aspect-square object-cover mb-6 grayscale"
            />
            
            <div className="font-mono text-sm space-y-6 mb-8">
              <p className="leading-relaxed">
                Music promoter and artist manager based in Los Angeles. 15 years experience building careers 
                and creating unforgettable live experiences. Passionate about discovering emerging talent and 
                connecting artists with audiences worldwide.
              </p>
              <p className="leading-relaxed">
                Specializing in indie, electronic, and experimental music. From intimate club shows to 
                festival stages, I work with artists who push boundaries and refuse to compromise their vision.
              </p>
            </div>

            <div className="space-y-2 font-mono text-sm mb-12">
              <p>E: <a href="mailto:email@hf.com" className="text-red-600 hover:underline">email@hf.com</a></p>
              <p>IG: <a href="https://instagram.com/jdl" target="_blank" rel="noopener noreferrer" className="text-red-600 hover:underline">jdl</a></p>
            </div>
          </div>

          {/* Additional Images */}
          <div className="grid grid-cols-2 md:grid-cols-3 gap-6 mb-12">
            <img src="https://images.unsplash.com/photo-1470229538611-16ba8c7ffbd7?w=400&h=400&fit=crop" alt="Show 1" className="w-full aspect-square object-cover grayscale" />
            <img src="https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=400&h=400&fit=crop" alt="Show 2" className="w-full aspect-square object-cover grayscale" />
            <img src="https://images.unsplash.com/photo-1524368535928-5b5e00ddc76b?w=400&h=400&fit=crop" alt="Show 3" className="w-full aspect-square object-cover grayscale" />
          </div>

          {/* Venues */}
          <div>
            <h3 className="font-mono text-xl mb-6 border-b border-black pb-2">Venues</h3>
            <div className="font-mono text-sm space-y-3">
              {venues.map((venue, index) => (
                <p key={index}>{venue}</p>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    // MAIN APP
    function MusicPromoterPortfolio() {
      const [currentPage, setCurrentPage] = useState('landing');
      const [selectedArtist, setSelectedArtist] = useState(null);

      const handleNavigation = (page) => {
        setCurrentPage(page);
        setSelectedArtist(null);
      };

      const goToLanding = () => {
        setCurrentPage('landing');
        setSelectedArtist(null);
      };

      return (
        <div className="bg-white min-h-screen">
          {currentPage === 'landing' && (
            <LandingPage onNavigate={handleNavigation} />
          )}
          {currentPage === 'artists' && (
            <ArtistsPage 
              selectedArtist={selectedArtist}
              setSelectedArtist={setSelectedArtist}
              onNavigate={handleNavigation}
              goToLanding={goToLanding}
            />
          )}
          {currentPage === 'shows' && (
            <ShowsPage 
              onNavigate={handleNavigation}
              goToLanding={goToLanding}
            />
          )}
          {currentPage === 'taste' && (
            <TastePage 
              onNavigate={handleNavigation}
              goToLanding={goToLanding}
            />
          )}
          {currentPage === 'about' && (
            <AboutPage 
              onNavigate={handleNavigation}
              goToLanding={goToLanding}
            />
          )}
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MusicPromoterPortfolio />);
  </script>
</body>
</html>
